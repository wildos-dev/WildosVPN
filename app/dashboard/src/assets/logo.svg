<svg viewBox="0 0 747 747" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Censored text background -->
  <text x="373" y="200" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="#666666" opacity="0.15">CENSORED</text>
  
  <!-- Main chain - horizontal broken in center -->
  <g transform="translate(100, 320)">
    <!-- Left chain links -->
    <ellipse cx="50" cy="50" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="100" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="150" cy="50" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="200" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    
    <!-- Broken link left part -->
    <path d="M240 35 A 25 15 0 0 1 290 35 A 25 15 0 0 1 290 50" stroke="#e53e3e" stroke-width="6" fill="none"/>
    
    <!-- Break sparks in center -->
    <circle cx="310" cy="45" r="2" fill="#ff6b6b"/>
    <circle cx="315" cy="55" r="1.5" fill="#ff6b6b"/>
    <circle cx="305" cy="52" r="1" fill="#ff9999"/>
    <line x1="300" y1="40" x2="320" y2="60" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="320" y1="40" x2="300" y2="60" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Broken link right part -->
    <path d="M340 35 A 25 15 0 0 1 390 35 A 25 15 0 0 1 390 65" stroke="#e53e3e" stroke-width="6" fill="none"/>
    
    <!-- Right chain links -->
    <ellipse cx="420" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="470" cy="50" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="520" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="570" cy="50" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
  </g>
  
  <!-- Vertical chain on left - broken -->
  <g transform="translate(200, 150)">
    <ellipse cx="50" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="50" cy="100" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="50" cy="150" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    
    <!-- Broken part -->
    <path d="M35 185 A 15 25 0 0 1 65 185 A 15 25 0 0 1 50 210" stroke="#e53e3e" stroke-width="6" fill="none"/>
    <!-- Falling piece -->
    <ellipse cx="80" cy="250" rx="15" ry="25" stroke="#e53e3e" stroke-width="6" fill="none" transform="rotate(45 80 250)"/>
  </g>
  
  <!-- Vertical chain on right - broken -->
  <g transform="translate(500, 180)">
    <ellipse cx="50" cy="50" rx="15" ry="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <ellipse cx="50" cy="100" rx="25" ry="15" stroke="#4a5568" stroke-width="6" fill="none"/>
    
    <!-- Broken part -->
    <path d="M35 135 A 15 25 0 0 1 50 160" stroke="#e53e3e" stroke-width="6" fill="none"/>
    <path d="M50 160 A 15 25 0 0 1 65 135" stroke="#e53e3e" stroke-width="6" fill="none"/>
    
    <!-- Falling pieces -->
    <ellipse cx="20" cy="200" rx="25" ry="15" stroke="#e53e3e" stroke-width="6" fill="none" transform="rotate(-30 20 200)"/>
    <ellipse cx="75" cy="220" rx="15" ry="25" stroke="#e53e3e" stroke-width="6" fill="none" transform="rotate(60 75 220)"/>
  </g>
  
  <!-- Scattered broken pieces -->
  <ellipse cx="150" cy="500" rx="20" ry="12" stroke="#e53e3e" stroke-width="4" fill="none" transform="rotate(75 150 500)"/>
  <ellipse cx="600" cy="480" rx="12" ry="20" stroke="#e53e3e" stroke-width="4" fill="none" transform="rotate(-45 600 480)"/>
  <ellipse cx="350" cy="550" rx="18" ry="10" stroke="#e53e3e" stroke-width="4" fill="none" transform="rotate(120 350 550)"/>
  <ellipse cx="80" cy="450" rx="10" ry="18" stroke="#e53e3e" stroke-width="4" fill="none" transform="rotate(-60 80 450)"/>
  
  <!-- Freedom symbol - broken shackle -->
  <g transform="translate(320, 450)">
    <circle cx="50" cy="50" r="40" stroke="#2d3748" stroke-width="8" fill="none" stroke-dasharray="0 40 100 40"/>
    <circle cx="50" cy="50" r="25" stroke="#4a5568" stroke-width="6" fill="none"/>
    <!-- Break in shackle -->
    <path d="M20 25 L5 10" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <path d="M25 20 L10 5" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Additional "CENSORED" stamp effect -->
  <text x="373" y="600" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#e53e3e" opacity="0.6" transform="rotate(-8 373 600)">CENSORED</text>
  
  <!-- Border effect around stamp -->
  <rect x="280" y="580" width="186" height="40" stroke="#e53e3e" stroke-width="2" fill="none" opacity="0.4" transform="rotate(-8 373 600)" rx="5"/>
</svg>